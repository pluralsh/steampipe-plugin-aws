name: Stale Issues and PRs
on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:
    inputs:
      dryRun:
        description: Set to true for a dry run
        required: false
        default: "false"
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale_workflow:
    uses: turbot/steampipe-workflows/.github/workflows/stale.yml@d43b861891f5d98605bf0ae543cc75430e7c4854
    with:
      dryRun: ${{ github.event.inputs.dryRun }}
